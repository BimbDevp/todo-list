<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="sidebar"></div>
    <div class="main-content"></div>

    <dialog>
        <form>
            <label for="title">Title:</label>
            <input type="text" name="title" id="title">

            <label for="desc">Description:</label>
            <input type="text" name="desc" id="desc">

            <label for="due-date">Due date:</label>
            <input type="date" name="due-date" id="due-date">

            <label for="priority">Priority:</label>
            <select name="priority" id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <input type="checkbox" name="is-completed" id="is-completed">
            <label for="is-completed">progress</label>

            <button>Create task</button>
        </form>
    </dialog>

    <dialog>
        <form>
            <label for="project-title">Title:</label>
            <input type="text" name="project-title" id="project-title">

            <label for="color">Color:</label>
            <select name="color" id="color">
                <option value="red">Red</option>
                <option value="yellow">Yellow</option>
                <option value="green">Green</option>
            </select>
            <button>Create project</button>
        </form>
    </dialog>

    <button class="create-project">Add project</button>
    <button class="create-task">Add task</button>
</body>

</html>
